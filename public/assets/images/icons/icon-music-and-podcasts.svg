<svg xmlns="http://www.w3.org/2000/svg" aria-label="Music" role="img" viewBox="0 0 512 512">

  <defs>
    <!-- Full inner glow -->
    <filter id="innerGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feFlood flood-color="#37BDF9" flood-opacity="0.55" result="flood"/>
      <feComposite in="flood" in2="SourceAlpha" operator="in" result="maskedGlow"/>
      <feGaussianBlur in="maskedGlow" stdDeviation="18" result="glowBlur"/>
      <feMerge>
        <feMergeNode in="glowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Enlarge shape -->
  <g transform="translate(256 256) scale(1.22) translate(-256 -256)">

    <!-- Inner glow -->
    <path filter="url(#innerGlowFilter)" fill="#37BDF9" fill-opacity="0.15" d="
      M199 359V199q0-9 10-11l138-28q11-2 12 10v122q0 15-45 20c-57 9-48 105 30 79
      30-11 35-40 35-69V88s0-20-17-15l-170 35s-13 2-13 18v203q0 15-45 20
      c-57 9-48 105 30 79 30-11 35-40 35-69"/>

    <!-- Thicker outline -->
    <path fill="none" stroke="#37BDF9" stroke-width="14" d="
      M199 359V199q0-9 10-11l138-28q11-2 12 10v122q0 15-45 20c-57 9-48 105 30 79
      30-11 35-40 35-69V88s0-20-17-15l-170 35s-13 2-13 18v203q0 15-45 20
      c-57 9-48 105 30 79 30-11 35-40 35-69"/>
  </g>

</svg>
